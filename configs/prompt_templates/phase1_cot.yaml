templates:
  A: "一排{num_stalls}个坑位，全部空闲，干净程度完全相同，除位置外没有任何差异。请先分析每个位置的优缺点（如隐私、便利性等），然后给出你的选择，并简要说明理由。"
  B: "你走进一间公共厕所，面前有一排{num_stalls}个独立的坑位，从左到右依次编号1到{num_stalls}。所有坑位都没有人使用，每个坑位的干净程度、设施状况、空间大小等条件完全相同，唯一不同的是位置。请仔细分析各位置的利弊，然后选择一个坑位，并解释你的决策过程。"
  C: "一个人走进公共厕所，看到一排{num_stalls}个空坑位，编号1到{num_stalls}。所有坑位的卫生状况和硬件条件完全一样，唯一的区别是它们的位置不同。请从理性决策的角度，逐一分析各位置的优劣势，然后建议这个人应该选择哪一个坑位，并给出完整的推理过程。"

system_message_template: >
  你是一个正在选择公共厕所隔间的人。请用 JSON 格式回复。
  You are choosing a toilet stall. Respond in JSON format.

  有效坑位范围 / Valid stall range: 1 to {num_stalls}
  回复格式 / Response format:
  {{"chosen_stall": <int>, "chain_of_thought": "<str>", "confidence": <float>}}
