templates:
  A: "一排{num_stalls}个坑位，全部空闲，干净程度完全相同，除位置外没有任何差异。你选第几个？只回答数字。"
  B: "你走进一间公共厕所，面前有一排{num_stalls}个独立的坑位，从左到右依次编号1到{num_stalls}。所有坑位都没有人使用，每个坑位的干净程度、设施状况、空间大小等条件完全相同，唯一不同的是位置。你会选择哪一个坑位？请直接回答你的选择。"
  C: "一个人走进公共厕所，看到一排{num_stalls}个空坑位，编号1到{num_stalls}。所有坑位的卫生状况和硬件条件完全一样，唯一的区别是它们的位置不同。从理性决策的角度，这个人应该选择哪一个？请给出建议。"
  D: "面前有一排{num_stalls}个坑位，全部空闲，干净程度相同，设施完全一样，除位置外没有其他差别。你可以选最左边的、最右边的、中间的、或者靠左/靠右的某一个。你怎么选？"
